<!doctype html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alyamama:wght@400;700&family=Clicker+Script&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.4.4">
    <title>
        {% block title %} Shaxriyor's Blog {% endblock title %}
    </title>
</head>
<body class="d-flex flex-column min-vh-100">

{% include 'components/_navbar.html' %}

<main class="flex-grow-1">
    {% block content %}
    {% endblock content %}
</main>

{% include 'components/_footer.html' %}
{% include 'components/_script.html' %}

</body>
</html>
